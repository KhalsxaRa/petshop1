
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        :root {
        --color-white: #fff;
        --color-wb: #D4EBF8;
        --color-hitam: #000;
        --color-hijau-muda: #FFEAC5;
        --color-hijau-medium: #FFDBB5;
        --color-hijau-gelap: #6C4E31;
        --color-hijau-dark: #603F26;
        --color-kuneng: #eeff00;
    }

    * {
        /*border: 1px solid red !important;*/
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        list-style: none;
        text-decoration: none;
        font-family: "Poppins", sans-serif;
    }


        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url(/assets/background/background-login.jpg);
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            padding: 20px;
        }

        .login-container {
            background: var(--color-hijau-muda);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: var(--color-hijau-dark);
            font-size: 2em;
            margin-bottom: 10px;
        }

        .login-header p {
            color: var(--color-hijau-dark);
            font-size: 0.9em;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

         label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 0.9em;
            font-weight: 500;
        }

       input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #4a90e2;
            background-color: #FFEAC5;
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }
        .login-button {
            width: 100%;
            padding: 12px;
            background-color: var(--color-hijau-dark);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-button:hover {
            background-color: var(--color-hijau-gelap);
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: #666;
        }

        .signup-link a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 20px;
            }

            .login-header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body style="background-color: #603F26;">
    <div class="login-container">
        <div class="login-header">
            <h1>Register!</h1>
            <p>Buat akun anda</p>
        </div>
        <form onsubmit="return sign(event)">
           <!-- <form > -->
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" placeholder="Masukkan username"  required="">
            
           
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="Masukkan email" required="">
            
           
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Masukkan password" required="">
           
            <br>
            <button type="submit" class="login-button" >Register</button>
           
            <div class="signup-link">
                Sudah memiliki akun? <a href="login.html">Login</a>
            
        </form>
    </div>

   

</body>
<script src="./regist.js"></script>
</html>
